<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Llamenos - Download Desktop App</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #e0e0e0; background: #0a0a0a; }
    h1 { color: #fff; margin-bottom: 8px; }
    p { line-height: 1.6; }
    a { color: #60a5fa; }
    .subtitle { color: #9ca3af; margin-bottom: 32px; }
    .downloads { display: flex; gap: 16px; flex-wrap: wrap; margin: 24px 0; }
    .btn { display: inline-block; padding: 12px 24px; background: #1e40af; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .btn:hover { background: #2563eb; }
    .note { color: #6b7280; font-size: 14px; margin-top: 32px; border-top: 1px solid #1f2937; padding-top: 16px; }
  </style>
</head>
<body>
  <h1>Llamenos</h1>
  <p class="subtitle">Secure crisis response platform</p>
  <p>Llamenos is a desktop application. Download the app for your platform to connect to this server:</p>
  <div class="downloads">
    <a class="btn" href="/api/download/windows">Windows</a>
    <a class="btn" href="/api/download/macos">macOS</a>
    <a class="btn" href="/api/download/linux">Linux</a>
  </div>
  <p class="note">
    The API is running at this address. Desktop clients connect to it automatically.<br>
    Visit <a href="https://llamenos-hotline.com">llamenos-hotline.com</a> for documentation.
  </p>
</body>
</html>
