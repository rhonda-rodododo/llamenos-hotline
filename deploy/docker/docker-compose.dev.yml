# v1 dev port offsets — avoids conflicts with llamenos v2 (~/projects/llamenos)
# v2 uses: postgres:5432, rustfs:9000/9001, strfry:7777
# v1 uses: postgres:5433, rustfs:9002/9003, strfry:7778, asterisk-ari:8089, asterisk-sip:5062, asterisk-wss:8090, kamailio-sip:5070, kamailio-tls:5071, kamailio-jsonrpc:5074, coturn:3478
#
# Asterisk + bridge are enabled via --profile asterisk in the dev:docker script.
#
# The internal network is overridden to allow host port mappings in dev.
# In production, internal: true keeps backing services off the host network.
#
# Usage:
#   bun run dev:docker        # start all dev services (incl. asterisk)
#   bun run dev:docker:down   # stop dev services
#   bun run dev:server        # run app locally against these services

# Override the internal network to allow port mappings on the host
networks:
  internal:
    internal: false

services:
  postgres:
    ports:
      - "5433:5432"
  rustfs:
    ports:
      - "9002:9000"
      - "9003:9001"
  strfry:
    ports:
      - "7778:7777"
    volumes:
      - ./strfry-test.conf:/etc/strfry.conf:ro

  # Authentik IdP — dev port offset (9100 to avoid conflict with RustFS console at 9003)
  authentik-server:
    ports:
      - "9100:9000"

  # Asterisk PBX — dev port offsets
  asterisk:
    ports:
      - "8089:8088"     # ARI HTTP/WS (offset from default 8088)
      - "8090:8089"     # WSS for browser SIP clients (offset: host 8090 → container 8089)
      - "5062:5060/udp" # SIP UDP (offset from default 5060)
      - "5062:5060/tcp" # SIP TCP
    volumes:
      - ../sip-bridge/dev-certs/asterisk.pem:/etc/asterisk/keys/asterisk.pem:ro
      - ../sip-bridge/dev-certs/asterisk.key:/etc/asterisk/keys/asterisk.key:ro

  # SIP bridge — dev-friendly defaults, webhook to local dev server
  sip-bridge:
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_REST_URL=http://asterisk:8088/ari
      - ARI_USERNAME=llamenos
      - ARI_PASSWORD=changeme
      - WORKER_WEBHOOK_URL=http://host.docker.internal:3000
      - BRIDGE_SECRET=dev-bridge-secret
      - BRIDGE_PORT=3001
      - HOTLINE_NUMBER=${HOTLINE_NUMBER:-}
      - SIP_PROVIDER=${SIP_PROVIDER:-}
      - SIP_USERNAME=${SIP_USERNAME:-}
      - SIP_PASSWORD=${SIP_PASSWORD:-}
    ports:
      - "3001:3001"     # Bridge HTTP API
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      asterisk:
        condition: service_healthy

  # Kamailio SIP proxy — dev port offsets
  kamailio:
    ports:
      - "5070:5060/udp"   # SIP UDP (offset from default 5060)
      - "5070:5060/tcp"   # SIP TCP
      - "5071:5061/tcp"   # SIP TLS
      - "5074:5064"       # JSONRPC (for sip-bridge KamailioClient)

  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/tcp"
    command: >
      turnserver
      --realm=localhost
      --use-auth-secret
      --static-auth-secret=dev-turn-secret-changeme
      --listening-port=3478
      --min-port=49152
      --max-port=49172
      --no-cli
      --fingerprint
      --log-file=stdout
    networks:
      - internal

  # Whisper transcription — dev port for host access
  whisper:
    ports:
      - "8085:8000"

  # Signal notifier sidecar — dev port for host access
  signal-notifier:
    ports:
      - "3100:3100"

  # vLLM inference server — firehose report agent (optional)
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3.5-9B
      --max-model-len 8192
      --guided-decoding-backend outlines
      --structured-outputs-config.enable_in_reasoning=True
    ports:
      - "8000:8000"
    profiles:
      - firehose
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - internal
