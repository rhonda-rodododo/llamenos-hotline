# Llamenos Self-Hosted Docker Compose
#
# Core services (always start):
#   app      - Llamenos application (Bun)
#   postgres - PostgreSQL database
#   caddy    - Reverse proxy with automatic TLS
#   rustfs   - S3-compatible blob storage (RustFS)
#   strfry   - Nostr relay for real-time events
#
# Optional services (via --profile):
#   whisper   - Self-hosted transcription (profile: transcription)
#   asterisk  - Self-hosted PBX (profile: asterisk)
#   asterisk-bridge - ARI-to-webhook translator (profile: asterisk)
#   signal-cli - Signal messaging bridge (profile: signal)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d                               # Core (includes relay)
#   docker compose --profile transcription up -d        # + Whisper
#   docker compose --profile asterisk up -d             # + Asterisk
#   docker compose --profile signal up -d               # + Signal
#   COMPOSE_PROFILES=transcription,signal docker compose up -d
#
# Quick start:
#   cd deploy/docker
#   ../../scripts/docker-setup.sh      # generates .env with random secrets
#   docker compose up -d               # start all core services
#   open http://localhost:8000           # setup wizard creates admin account

name: llamenos

services:
  # ── Core ──────────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_COMMIT: ${BUILD_COMMIT:-local}
        BUILD_TIME: ${BUILD_TIME:-}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    environment:
      - PLATFORM=node
      - PORT=3000
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/llamenos
      - PG_POOL_SIZE=${PG_POOL_SIZE:-20}
      - ADMIN_PUBKEY=${ADMIN_PUBKEY:-}
      - ADMIN_DECRYPTION_PUBKEY=${ADMIN_DECRYPTION_PUBKEY:-}
      - HOTLINE_NAME=${HOTLINE_NAME:-Hotline}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEMO_MODE=${DEMO_MODE:-}
      - "HMAC_SECRET=${HMAC_SECRET:?HMAC_SECRET is required — run ../../scripts/docker-setup.sh to generate}"
      - STORAGE_ENDPOINT=http://rustfs:9000
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
      - STORAGE_SSE_ENABLED=${STORAGE_SSE_ENABLED:-true}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8080/v1/audio/transcriptions}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      # Nostr relay — required for all real-time events (presence, calls, messages)
      - "SERVER_NOSTR_SECRET=${SERVER_NOSTR_SECRET:?SERVER_NOSTR_SECRET is required — run ../../scripts/docker-setup.sh to generate}"
      - NOSTR_RELAY_URL=${NOSTR_RELAY_URL:-ws://strfry:7777}
      # IdP Auth (Authentik)
      - IDP_ADAPTER=${IDP_ADAPTER:-authentik}
      - AUTHENTIK_URL=${AUTHENTIK_URL:-http://authentik-server:9000}
      - "AUTHENTIK_API_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN:?AUTHENTIK_BOOTSTRAP_TOKEN is required}"
      - "IDP_VALUE_ENCRYPTION_KEY=${IDP_VALUE_ENCRYPTION_KEY:?IDP_VALUE_ENCRYPTION_KEY is required}"
      - IDP_VALUE_KEY_VERSION=${IDP_VALUE_KEY_VERSION:-1}
      - "JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}"
      - AUTH_WEBAUTHN_RP_ID=${AUTH_WEBAUTHN_RP_ID:-${DOMAIN:-localhost}}
      - AUTH_WEBAUTHN_RP_NAME=${AUTH_WEBAUTHN_RP_NAME:-Llamenos}
      - AUTH_WEBAUTHN_ORIGIN=${AUTH_WEBAUTHN_ORIGIN:-https://${DOMAIN:-localhost}}
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      strfry:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "llamenos-app"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  postgres:
    image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "max_connections=1000"]
    environment:
      - POSTGRES_DB=llamenos
      - POSTGRES_USER=llamenos
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2.9-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CADDY_SITE_ADDRESS=${CADDY_SITE_ADDRESS:-}
      - ACME_EMAIL=${ACME_EMAIL:-}
    networks:
      - web
      - internal  # Required for reverse_proxy to strfry (Nostr relay)
    depends_on:
      app:
        condition: service_healthy

  rustfs:
    image: rustfs/rustfs:latest@sha256:0725587f6fcca83c1898f321424327d6e6da5e01ea20382905dd258ed5af3be4
    command: server /data
    restart: unless-stopped
    volumes:
      - rustfs-data:/data
    environment:
      - RUSTFS_ACCESS_KEY=${STORAGE_ACCESS_KEY:?Set STORAGE_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY}
      - RUSTFS_CONSOLE_ENABLE=true
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Core: Nostr Relay (strfry) ────────────────────────────
  strfry:
    # Pin to specific tag for reproducible deployments
    image: dockurr/strfry:1.0.1@sha256:4bcfddc8aab07e17d35198c0618d6a9c8e5d3e27b211741ebce9f7058cdd1e21
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    volumes:
      - nostr-data:/app/strfry-db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Core: Authentik IdP ───────────────────────────────────
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.12@sha256:33a92b246b798f23931ce62027e045ecf302c3bc198b6389225973db6448a886
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY is required}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-llamenos}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:?AUTHENTIK_BOOTSTRAP_TOKEN is required}
    # No host port mapping in base — override files add port mappings per environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - ./authentik-blueprints:/blueprints/custom:ro
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.12@sha256:33a92b246b798f23931ce62027e045ecf302c3bc198b6389225973db6448a886
    command: worker
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY is required}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-llamenos}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:?AUTHENTIK_BOOTSTRAP_TOKEN is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - ./authentik-blueprints:/blueprints/custom:ro

  # ── Optional: Whisper Transcription ───────────────────────
  whisper:
    image: fedirz/faster-whisper-server:0.4.1  # TODO: pin to digest when available
    profiles: ["transcription"]
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX ───────────────────────────────
  asterisk:
    image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015 # 20.x
    profiles: ["asterisk"]
    restart: unless-stopped
    volumes:
      - ../../asterisk-bridge/asterisk-config/ari.conf:/etc/asterisk/ari.conf:ro
      - ../../asterisk-bridge/asterisk-config/http.conf:/etc/asterisk/http.conf:ro
      - ../../asterisk-bridge/asterisk-config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ../../asterisk-bridge/asterisk-config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ../../asterisk-bridge/asterisk-config/sorcery.conf:/etc/asterisk/sorcery.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  asterisk-bridge:
    profiles: ["asterisk"]
    build:
      context: ../..
      dockerfile: asterisk-bridge/Dockerfile
    restart: unless-stopped
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_REST_URL=http://asterisk:8088/ari
      - ARI_USERNAME=${ARI_USERNAME:-llamenos}
      - ARI_PASSWORD=${ARI_PASSWORD:-}
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:-}
      - HOTLINE_NUMBER=${HOTLINE_NUMBER:-}
      # SIP trunk auto-config — set all three to enable PJSIP auto-configuration at startup
      - SIP_PROVIDER=${SIP_PROVIDER:-}
      - SIP_USERNAME=${SIP_USERNAME:-}
      - SIP_PASSWORD=${SIP_PASSWORD:-}
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy

  # ── Optional: Signal Messaging ───────────────────────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5
    profiles: ["signal"]
    restart: unless-stopped
    environment:
      - MODE=json-rpc
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  rustfs-data:
  nostr-data:
  signal-data:
  authentik-media:
  authentik-templates:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
