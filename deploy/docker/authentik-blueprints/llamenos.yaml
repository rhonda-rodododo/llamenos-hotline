# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
#
# Llamenos Authentik Blueprint
#
# Provisions the OAuth2/OIDC provider, custom scope mapping, application,
# and service-account group that the Llamenos app uses for IdP auth.
#
# Mounted into both authentik-server and authentik-worker at
# /blueprints/custom/llamenos.yaml. Authentik auto-discovers and applies
# blueprints on startup.

version: 1

metadata:
  name: llamenos-idp
  labels:
    blueprints.goauthentik.io/description: "Llamenos crisis hotline IdP configuration"

entries:
  # ── 1. Service-account group with API permissions ──────────────
  - model: authentik_core.group
    id: llamenos-service-group
    identifiers:
      name: llamenos-service-accounts
    state: present
    attrs:
      name: llamenos-service-accounts
      is_superuser: false

  # ── 2. Custom scope mapping: nsec_secret ───────────────────────
  # Exposes the encrypted nsec_secret from the user's attributes
  # as a custom OIDC claim. The value is AES-encrypted at rest in
  # Authentik; the Llamenos server decrypts it after token exchange.
  - model: authentik_providers_oauth2.scopemapping
    id: llamenos-nsec-scope
    identifiers:
      scope_name: llamenos_nsec
    state: present
    attrs:
      name: "Llamenos nsec_secret"
      scope_name: llamenos_nsec
      description: "Encrypted Nostr secret key for Llamenos identity"
      expression: |
        # Return the nsec_secret attribute if present on the user.
        # This is an encrypted blob — the Llamenos server decrypts it.
        nsec = request.user.attributes.get("nsec_secret", None)
        if nsec is not None:
            return {"nsec_secret": nsec}
        return {}

  # ── 3. OAuth2/OIDC provider ────────────────────────────────────
  - model: authentik_providers_oauth2.oauth2provider
    id: llamenos-oauth2-provider
    identifiers:
      name: llamenos
    state: present
    attrs:
      name: llamenos
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      # Tokens
      access_code_validity: "minutes=10"
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
      # Scopes: standard OIDC + custom nsec
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
        - !KeyOf llamenos-nsec-scope
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  # ── 4. Application ─────────────────────────────────────────────
  - model: authentik_core.application
    id: llamenos-application
    identifiers:
      slug: llamenos
    state: present
    attrs:
      name: Llamenos
      slug: llamenos
      provider: !KeyOf llamenos-oauth2-provider
      policy_engine_mode: any
