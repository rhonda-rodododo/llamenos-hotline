# Production overrides for Llamenos Docker deployment
#
# Adds: production Caddyfile (real domain + TLS), log rotation, resource limits.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# Or via the setup script (recommended):
#   ../../scripts/docker-setup.sh --domain hotline.yourorg.com --email admin@yourorg.com

services:
  app:
    environment:
      - ENVIRONMENT=production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  caddy:
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  rustfs:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  strfry:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      # Allows Watchtower to manage Docker containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount host Docker config for GHCR auth (alternative to env vars)
      # - /root/.docker/config.json:/config.json:ro
    environment:
      # Only watch containers with the watchtower.enable=true label
      - WATCHTOWER_LABEL_ENABLE=true
      # Cron schedule for update checks (default: 04:00 UTC daily)
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 4 * * *}
      # Remove old images after updating
      - WATCHTOWER_CLEANUP=true
      # Log level: info | debug | warn | error | trace
      - WATCHTOWER_LOG_LEVEL=${WATCHTOWER_LOG_LEVEL:-info}
      # GHCR authentication (if image is private)
      # Watchtower reads standard Docker registry env vars:
      - REPO_USER=${GHCR_USERNAME:-}
      - REPO_PASS=${GHCR_TOKEN:-}
      # ── Notifications (optional) ──
      # Shoutrrr URL for update notifications. Examples:
      #   Slack:    slack://token-a/token-b/token-c
      #   Discord:  discord://token@id
      #   Email:    smtp://user:pass@host:port/?from=x&to=y
      #   Gotify:   gotify://host/token
      # See https://containrrr.dev/shoutrrr/latest/services/overview/
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
      # Go template for notification messages (optional)
      # - WATCHTOWER_NOTIFICATION_TEMPLATE={{range .}}{{.Message}}{{println}}{{end}}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
