{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llamenos.fullname" . }}-secrets
  labels:
    {{- include "llamenos.labels" . | nindent 4 }}
type: Opaque
data:
  admin-pubkey: {{ .Values.secrets.adminPubkey | b64enc | quote }}
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | b64enc | quote }}
  twilio-account-sid: {{ .Values.secrets.twilioAccountSid | default "" | b64enc | quote }}
  twilio-auth-token: {{ .Values.secrets.twilioAuthToken | default "" | b64enc | quote }}
  twilio-phone-number: {{ .Values.secrets.twilioPhoneNumber | default "" | b64enc | quote }}
  hmac-secret: {{ required "secrets.hmacSecret is required" .Values.secrets.hmacSecret | b64enc | quote }}
  server-nostr-secret: {{ required "secrets.serverNostrSecret is required" .Values.secrets.serverNostrSecret | b64enc | quote }}
  jwt-secret: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | b64enc | quote }}
  idp-value-encryption-key: {{ required "secrets.idpValueEncryptionKey is required" .Values.secrets.idpValueEncryptionKey | b64enc | quote }}
  authentik-secret-key: {{ required "secrets.authentikSecretKey is required" .Values.secrets.authentikSecretKey | b64enc | quote }}
  authentik-bootstrap-token: {{ required "secrets.authentikBootstrapToken is required" .Values.secrets.authentikBootstrapToken | b64enc | quote }}
  {{- if .Values.rustfs.enabled }}
  rustfs-access-key: {{ required "rustfs.credentials.accessKey is required" .Values.rustfs.credentials.accessKey | b64enc | quote }}
  rustfs-secret-key: {{ required "rustfs.credentials.secretKey is required" .Values.rustfs.credentials.secretKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.asteriskBridge.enabled }}
  bridge-secret: {{ required "asteriskBridge.bridgeSecret is required" .Values.asteriskBridge.bridgeSecret | b64enc | quote }}
  bridge-sip-provider: {{ .Values.asteriskBridge.sipProvider | default "" | b64enc | quote }}
  bridge-sip-username: {{ .Values.asteriskBridge.sipUsername | default "" | b64enc | quote }}
  bridge-sip-password: {{ .Values.asteriskBridge.sipPassword | default "" | b64enc | quote }}
  bridge-hotline-number: {{ .Values.asteriskBridge.hotlineNumber | default "" | b64enc | quote }}
  {{- end }}
{{- end }}
