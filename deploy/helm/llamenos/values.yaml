# Llamenos Helm chart values

app:
  image:
    repository: ghcr.io/your-org/llamenos
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    HOTLINE_NAME: "Hotline"
    ENVIRONMENT: "production"

# PostgreSQL connection
postgres:
  host: ""       # Required: e.g. my-rds-instance.region.rds.amazonaws.com
  port: 5432
  database: llamenos
  user: llamenos
  poolSize: 20

# RustFS for blob storage (S3-compatible)
rustfs:
  enabled: true
  image:
    repository: rustfs/rustfs
    tag: "latest"
  persistence:
    size: 50Gi
    storageClass: ""
  # REQUIRED: Set unique credentials — never use defaults
  credentials:
    accessKey: ""
    secretKey: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Whisper transcription
whisper:
  enabled: false
  image:
    repository: fedirz/faster-whisper-server
    tag: "0.4.1"  # TODO: pin to digest when available
  model: "Systran/faster-whisper-base"
  device: "cpu"  # or "cuda" for GPU
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

# Asterisk PBX
asterisk:
  enabled: false
  image:
    repository: andrius/asterisk
    tag: "20.11"

# Asterisk bridge
asteriskBridge:
  enabled: false
  image:
    repository: ghcr.io/your-org/llamenos-asterisk-bridge
    tag: ""
  # REQUIRED if using Asterisk: set a strong random secret
  bridgeSecret: ""
  # Hotline phone number (E.164, e.g. +12125551234)
  hotlineNumber: ""
  # SIP trunk auto-config — set all three to enable PJSIP auto-configuration at startup
  sipProvider: ""   # e.g. sip.telnyx.com or sip.twilio.com
  sipUsername: ""   # SIP username / account SID
  sipPassword: ""   # SIP password / auth token

# Nostr relay (strfry) — required for all real-time events
nostr:
  relayUrl: "ws://strfry:7777"
  image:
    repository: dockurr/strfry
    tag: "latest"
  persistence:
    size: 5Gi
    storageClass: ""

# Signal CLI messaging bridge
signal:
  enabled: false
  image:
    repository: bbernhard/signal-cli-rest-api
    tag: "0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5"
  persistence:
    size: 1Gi

# Network policies (restrict pod-to-pod traffic)
networkPolicy:
  enabled: true
  ingressControllerLabels: {}
    # Use Caddy-ingress or Traefik labels here
    # nginx is NOT recommended due to its history of security vulnerabilities

# Ingress
ingress:
  enabled: true
  className: ""  # Use Caddy-ingress or Traefik; nginx is NOT recommended
  annotations: {}
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: hotline.example.org
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: llamenos-tls
  #   hosts:
  #     - hotline.example.org

# Secrets (reference existing K8s secrets)
secrets:
  # Create a secret named "llamenos-secrets" with these keys:
  #   admin-pubkey, postgres-password, twilio-account-sid, twilio-auth-token, twilio-phone-number
  existingSecret: ""
  # Or provide values directly (will be base64-encoded into a Secret)
  adminPubkey: ""
  postgresPassword: ""  # Required
  hmacSecret: ""         # Required: 64-char hex, generate with: openssl rand -hex 32
  twilioAccountSid: ""
  twilioAuthToken: ""
  twilioPhoneNumber: ""
  serverNostrSecret: ""  # Required: 64-char hex, generate with: openssl rand -hex 32

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod-level settings
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
