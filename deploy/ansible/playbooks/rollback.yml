---
# Manual Rollback Playbook
#
# Rolls back to the previous known-good deployment state.
# Restores saved docker-compose.yml and .env, then restarts all services.
#
# Usage:
#   ansible-playbook playbooks/rollback.yml --ask-vault-pass
#   ansible-playbook playbooks/rollback.yml --ask-vault-pass -e rollback_skip_backup=true

- name: Rollback Llamenos to Previous Version
  hosts: all
  become: true
  vars_files:
    - ../vars.yml
  vars:
    rollback_skip_backup: false

  tasks:
    # ── Pre-flight Checks ──────────────────────────────────────────
    - name: Check rollback files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ app_dir }}/.rollback-docker-compose.yml"
        - "{{ app_dir }}/.rollback-env"
      register: rollback_files

    - name: Fail if no rollback state available
      ansible.builtin.fail:
        msg: |
          No rollback state found. Expected files:
            {{ app_dir }}/.rollback-docker-compose.yml
            {{ app_dir }}/.rollback-env

          These are created during each update. If this is a fresh deployment,
          there is nothing to roll back to.
      when: rollback_files.results | selectattr('stat.exists', 'false') | list | length > 0

    # ── Snapshot Current State ─────────────────────────────────────
    - name: Track current versions before rollback
      ansible.builtin.include_role:
        name: llamenos-version-tracker
      tags: [rollback, version]

    - name: Display current versions (about to roll back from)
      ansible.builtin.debug:
        msg: "Rolling back from: {{ current_versions | to_nice_json }}"

    # ── Pre-rollback Backup ────────────────────────────────────────
    - name: Run pre-rollback backup
      ansible.builtin.include_role:
        name: backup
      when: not (rollback_skip_backup | bool)
      tags: [rollback, backup]

    # ── Perform Rollback ───────────────────────────────────────────
    - name: Restore previous docker-compose.yml
      ansible.builtin.copy:
        src: "{{ app_dir }}/.rollback-docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0640"

    - name: Restore previous .env
      ansible.builtin.copy:
        src: "{{ app_dir }}/.rollback-env"
        dest: "{{ app_dir }}/.env"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"

    - name: Stop all services
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: stopped

    - name: Pull images referenced in restored compose file
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: policy
        state: present
        recreate: always
        wait: true
        wait_timeout: 180

    # ── Health Verification ────────────────────────────────────────
    - name: Wait for PostgreSQL after rollback
      ansible.builtin.command: >
        docker compose -f {{ app_dir }}/docker-compose.yml
        exec -T postgres pg_isready -U llamenos -d llamenos
      register: pg_health
      retries: 15
      delay: 3
      until: pg_health.rc == 0
      changed_when: false

    - name: Wait for application health check
      ansible.builtin.uri:
        url: "http://localhost:3000/api/health"
        method: GET
        status_code: 200
        return_content: true
      register: rollback_health
      retries: 30
      delay: 5
      until: rollback_health.status == 200

    - name: Verify all services are running
      ansible.builtin.shell: |
        cd {{ app_dir }}
        unhealthy=$(docker compose ps --format json | \
          python3 -c "
        import sys, json
        lines = sys.stdin.read().strip().split('\n')
        for line in lines:
            if not line: continue
            svc = json.loads(line)
            state = svc.get('State', '')
            health = svc.get('Health', '')
            if state != 'running' or (health and health != 'healthy'):
                print(svc.get('Service', 'unknown'))
        " 2>/dev/null || true)
        if [ -n "$unhealthy" ]; then
          echo "UNHEALTHY: $unhealthy"
          exit 1
        fi
        echo "All services healthy"
      register: all_services_check
      changed_when: false
      failed_when: all_services_check.rc != 0

    # ── Record Rollback ────────────────────────────────────────────
    - name: Record rollback to version history
      ansible.builtin.include_role:
        name: llamenos-version-tracker
        tasks_from: record
      vars:
        version_action: rollback-manual
        version_result: success

    - name: Clean up old images
      ansible.builtin.shell: docker image prune -f
      changed_when: true

    - name: Display rollback summary
      ansible.builtin.debug:
        msg: |
          Rollback completed successfully.

          Application: https://{{ domain }}
          Health check: {{ rollback_health.json | default('OK') }}

          The previous version is now running. To view version history:
            ssh {{ deploy_user }}@{{ ansible_host }} 'cat {{ version_tracker_dir }}/history.json'
