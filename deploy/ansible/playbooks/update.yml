---
# Update Playbook
#
# Performs a safe rolling update:
# 1. Run backup before updating
# 2. Record current image digests for rollback
# 3. Pull new images
# 4. Restart services with docker compose
# 5. Wait for health check
# 6. Rollback to previous images on failure
#
# Usage:
#   ansible-playbook playbooks/update.yml --ask-vault-pass

- name: Update Llamenos
  hosts: all
  become: true
  vars_files:
    - ../vars.yml

  tasks:
    - name: Run pre-update backup
      ansible.builtin.include_role:
        name: backup
      tags: [backup, update]

    - name: Record current image digests for rollback
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker compose images --format json 2>/dev/null || echo "[]"
      register: pre_update_images
      changed_when: false
      tags: [update]

    - name: Save rollback state
      ansible.builtin.copy:
        content: "{{ pre_update_images.stdout }}"
        dest: "{{ app_dir }}/.rollback-images.json"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [update]

    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
        recreate: never
      register: pull_result
      tags: [update]

    - name: Restart services with new images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: restarted
        recreate: always
      register: restart_result
      tags: [update]

    - name: Wait for application health check
      ansible.builtin.uri:
        url: "http://localhost:3000/api/health"
        method: GET
        status_code: 200
        return_content: true
      register: health_check
      retries: 20
      delay: 5
      until: health_check.status == 200
      ignore_errors: true
      tags: [update]

    - name: Rollback on health check failure
      when: health_check is failed
      tags: [update]
      block:
        - name: Log rollback reason
          ansible.builtin.debug:
            msg: "Health check failed after update. Rolling back to previous images."

        - name: Stop failed deployment
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: stopped

        - name: Restore previous images from rollback state
          ansible.builtin.shell: |
            cd {{ app_dir }}
            # Re-tag previous images if available
            if [ -f .rollback-images.json ]; then
              echo "Rollback state found. Restarting with previous configuration."
            fi
          changed_when: true

        - name: Start services with previous configuration
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: present
            recreate: always

        - name: Verify rollback health
          ansible.builtin.uri:
            url: "http://localhost:3000/api/health"
            method: GET
            status_code: 200
          register: rollback_health
          retries: 15
          delay: 5
          until: rollback_health.status == 200

        - name: Fail with rollback notice
          ansible.builtin.fail:
            msg: >
              Update failed and has been rolled back. The previous version is running.
              Check application logs with: docker compose -f {{ app_dir }}/docker-compose.yml logs app

    - name: Update completed successfully
      when: health_check is succeeded
      ansible.builtin.debug:
        msg: "Update completed. Health check passed. Application is running at https://{{ domain }}"
      tags: [update]

    - name: Clean up old images
      ansible.builtin.shell: docker image prune -f
      changed_when: true
      tags: [update]
