---
# Security Update Playbook
#
# Applies security updates to OS packages and container images:
# 1. Run a security scan to assess current state
# 2. Apply OS-level security updates (non-Docker packages only)
# 3. Pull latest container images
# 4. Restart services with health check
# 5. Roll back on failure
#
# Usage:
#   ansible-playbook playbooks/security-update.yml --ask-vault-pass
#   ansible-playbook playbooks/security-update.yml --ask-vault-pass --check --diff

- name: Apply security updates
  hosts: all
  become: true
  vars_files:
    - ../vars.yml

  tasks:
    # ─── Pre-Update Scan ─────────────────────────────────────────
    - name: Run pre-update security scan
      ansible.builtin.include_role:
        name: security-scan
      vars:
        security_scan_fail_on_os_updates: false
      tags: [security-update, scan]

    # ─── Pre-Update Backup ───────────────────────────────────────
    - name: Run pre-update backup
      ansible.builtin.include_role:
        name: backup
      tags: [security-update, backup]

    # ─── Record Pre-Update State ─────────────────────────────────
    - name: Record current image digests for rollback
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker compose images --format json 2>/dev/null || echo "[]"
      register: pre_update_images
      changed_when: false
      tags: [security-update]

    - name: Save rollback state
      ansible.builtin.copy:
        content: "{{ pre_update_images.stdout }}"
        dest: "{{ app_dir }}/.rollback-images.json"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [security-update]

    # ─── Apply OS Security Updates ───────────────────────────────
    - name: Apply OS security updates
      ansible.builtin.apt:
        upgrade: safe
        update_cache: true
        cache_valid_time: 3600
      register: os_update_result
      tags: [security-update, os-update]

    - name: Report OS update results
      ansible.builtin.debug:
        msg: >
          OS packages updated: {{ os_update_result.changed | default(false) }}.
          {{ (os_update_result.stdout_lines | default([])) | length }} lines of output.
      tags: [security-update, os-update]

    # ─── Pull Latest Container Images ────────────────────────────
    - name: Pull latest container images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
        recreate: never
      register: pull_result
      tags: [security-update, container-update]

    - name: Restart services with updated images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: restarted
        recreate: always
      register: restart_result
      tags: [security-update, container-update]

    # ─── Health Check ────────────────────────────────────────────
    - name: Wait for application health check
      ansible.builtin.uri:
        url: "http://localhost:3000/api/health/ready"
        method: GET
        status_code: 200
        return_content: true
      register: health_check
      retries: 20
      delay: 5
      until: health_check.status == 200
      ignore_errors: true
      tags: [security-update]

    # ─── Rollback on Failure ─────────────────────────────────────
    - name: Rollback on health check failure
      when: health_check is failed
      tags: [security-update]
      block:
        - name: Log rollback reason
          ansible.builtin.debug:
            msg: "Health check failed after security update. Rolling back."

        - name: Stop failed deployment
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: stopped

        - name: Start services with previous configuration
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: present
            recreate: always

        - name: Verify rollback health
          ansible.builtin.uri:
            url: "http://localhost:3000/api/health/ready"
            method: GET
            status_code: 200
          register: rollback_health
          retries: 15
          delay: 5
          until: rollback_health.status == 200

        - name: Fail with rollback notice
          ansible.builtin.fail:
            msg: >
              Security update failed and has been rolled back. The previous version is running.
              Check logs: docker compose -f {{ app_dir }}/docker-compose.yml logs app

    # ─── Post-Update Scan ────────────────────────────────────────
    - name: Run post-update security scan
      ansible.builtin.include_role:
        name: security-scan
      vars:
        security_scan_fail_on_os_updates: false
      tags: [security-update, scan]

    - name: Security update completed successfully
      when: health_check is succeeded
      ansible.builtin.debug:
        msg: "Security update completed. Health check passed. Application is running at https://{{ domain }}"
      tags: [security-update]

    - name: Clean up old images
      ansible.builtin.shell: docker image prune -f
      changed_when: true
      tags: [security-update]
