---
# Application Deployment Playbook
#
# Deploys the Llamenos stack via Docker Compose:
# - Ensures Docker is installed
# - Templates docker-compose.yml, .env, and Caddyfile
# - Pulls images and starts services
# - Waits for health check to pass
#
# Usage:
#   ansible-playbook playbooks/deploy.yml --ask-vault-pass

- name: Load configuration variables
  hosts: all
  gather_facts: false
  tasks:
    - name: Include vars file
      ansible.builtin.include_vars:
        file: ../vars.yml
      tags: always

- name: Validate required variables
  ansible.builtin.import_playbook: preflight.yml

- name: Deploy Llamenos
  hosts: all
  become: true
  vars:
    # After hardening, SSH is restricted to deploy_user only.
    # Override the connection user for deployment tasks.
    ansible_user: "{{ deploy_user | default('deploy') }}"
  roles:
    - role: docker
      tags: [docker, deploy]
    - role: llamenos
      tags: [llamenos, deploy]
