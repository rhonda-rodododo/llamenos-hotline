---
# Docker role
#
# Installs Docker CE from the official repository with security hardening:
# - User namespace remapping (isolates container UIDs from host)
# - Default no-new-privileges (prevents privilege escalation in containers)
# - Logging configuration with rotation
# - Deploy user added to docker group

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    owner: root
    group: root

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Get Ubuntu codename
  ansible.builtin.command: lsb_release -cs
  register: ubuntu_codename
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable
    filename: docker
    state: present

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "default-ulimits": {
          "nofile": {
            "Name": "nofile",
            "Hard": 65536,
            "Soft": 32768
          }
        },
        "no-new-privileges": true,
        "live-restore": true,
        "userland-proxy": false,
        "iptables": true,
        "ip6tables": true{{ ',\n    "userns-remap": "default"' if docker_userns_remap else '' }}
      }
  notify: Restart docker

- name: Create userns-remap subordinate UID mapping
  ansible.builtin.copy:
    dest: /etc/subuid
    owner: root
    group: root
    mode: "0644"
    content: |
      dockremap:100000:65536
      {{ deploy_user }}:200000:65536
  when: docker_userns_remap

- name: Create userns-remap subordinate GID mapping
  ansible.builtin.copy:
    dest: /etc/subgid
    owner: root
    group: root
    mode: "0644"
    content: |
      dockremap:100000:65536
      {{ deploy_user }}:200000:65536
  when: docker_userns_remap

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Enable containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started

- name: Verify Docker is running
  ansible.builtin.command: docker info
  changed_when: false
