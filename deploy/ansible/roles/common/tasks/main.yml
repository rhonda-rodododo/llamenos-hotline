---
# Common role: base packages, NTP, locale, unattended-upgrades
#
# Establishes a consistent, secure baseline for the server.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - ca-certificates
      - software-properties-common
      - unattended-upgrades
      - apt-listchanges
      - chrony
      - logrotate
      - jq
      - htop
      - ncdu
      - tmux
    state: present

- name: Set timezone to {{ timezone }}
  community.general.timezone:
    name: "{{ timezone }}"

- name: Set locale to {{ locale }}
  ansible.builtin.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Configure Chrony NTP servers
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Enable and start Chrony
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Configure unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };

      Unattended-Upgrade::Package-Blacklist {
          "docker-ce";
          "docker-ce-cli";
          "containerd.io";
      };

      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

- name: Enable automatic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: sudo
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure deploy user has passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    owner: root
    group: root
    mode: "0440"
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    validate: "visudo -cf %s"

- name: Disable unused services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - snapd
    - snapd.socket
    - snapd.apparmor
  ignore_errors: true
