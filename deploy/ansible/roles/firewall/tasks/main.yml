---
# Firewall role: UFW configuration
#
# Default deny incoming, allow outgoing.
# Opens SSH (custom port), HTTP (80), and HTTPS (443).
# Supports additional ports via firewall_extra_ports variable.

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Disable UFW before reconfiguration (idempotent — avoids reset flushing iptables)
  community.general.ufw:
    state: disabled

- name: Set default incoming policy to deny
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH on port {{ ssh_port }}
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    comment: "SSH access"

- name: Allow SSH from specific CIDRs (if restricted)
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    src: "{{ item }}"
    comment: "SSH access (restricted)"
  loop: "{{ ssh_allowed_cidrs }}"
  when: ssh_allowed_cidrs | default([]) | length > 0 and ssh_allowed_cidrs != ['0.0.0.0/0']

- name: Allow HTTP (port 80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "HTTP for ACME challenge and redirect"

- name: Allow HTTPS (port 443)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "HTTPS"

- name: Allow HTTPS/UDP (port 443, HTTP/3 QUIC)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: udp
    comment: "HTTP/3 QUIC"

- name: Allow extra ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "{{ item.comment | default('Extra port') }}"
  loop: "{{ firewall_extra_ports }}"
  when: firewall_extra_ports | length > 0

- name: Configure UFW to allow Docker container networking
  ansible.builtin.blockinfile:
    path: /etc/ufw/after.rules
    marker: "# {mark} ANSIBLE MANAGED - Docker forwarding"
    block: |
      # Allow Docker container networking (FORWARD chain)
      -A ufw-after-forward -i docker0 -j ACCEPT
      -A ufw-after-forward -o docker0 -j ACCEPT
      -A ufw-after-forward -i br-+ -j ACCEPT
      -A ufw-after-forward -o br-+ -j ACCEPT
    insertbefore: "COMMIT"

- name: Set UFW default forward policy to ACCEPT for Docker
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: "on"

- name: Enable UFW at boot
  ansible.builtin.systemd:
    name: ufw
    enabled: true
