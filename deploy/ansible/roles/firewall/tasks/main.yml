---
# Firewall role: UFW configuration
#
# Default deny incoming, allow outgoing.
# Opens SSH (custom port), HTTP (80), and HTTPS (443).
# Supports additional ports via firewall_extra_ports variable.
#
# NOTE: Uses shell commands instead of community.general.ufw module
# to avoid iptables corruption issues observed on Tart VMs and some
# cloud instances where the module's disable/enable cycle breaks TCP.

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default forward policy to ACCEPT for Docker
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

- name: Configure UFW rules via shell
  ansible.builtin.shell: |
    set -e
    # Allow SSH first (before enabling deny policy)
    ufw allow {{ ssh_port }}/tcp comment 'SSH'
    ufw allow 80/tcp comment 'HTTP'
    ufw allow 443/tcp comment 'HTTPS'
    ufw allow 443/udp comment 'HTTP/3 QUIC'
    # Set default policies
    ufw default deny incoming
    ufw default allow outgoing
    # Enable (--force avoids interactive prompt)
    ufw --force enable
    echo "UFW configured and enabled"
  args:
    executable: /bin/bash
  changed_when: true

- name: Allow extra ports
  ansible.builtin.shell: "ufw allow {{ item.port }}/{{ item.proto | default('tcp') }} comment '{{ item.comment | default('Extra') }}'"
  loop: "{{ firewall_extra_ports }}"
  when: firewall_extra_ports | length > 0
  changed_when: true

- name: Configure UFW Docker forwarding rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/after.rules
    marker: "# {mark} ANSIBLE MANAGED - Docker forwarding"
    block: |
      -A ufw-after-forward -i docker0 -j ACCEPT
      -A ufw-after-forward -o docker0 -j ACCEPT
      -A ufw-after-forward -i br-+ -j ACCEPT
      -A ufw-after-forward -o br-+ -j ACCEPT
    insertbefore: "COMMIT"
  notify: Reload UFW

- name: Enable UFW at boot
  ansible.builtin.systemd:
    name: ufw
    enabled: true

