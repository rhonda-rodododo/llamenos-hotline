---
# Llamenos application deployment role
#
# - Creates app directory structure
# - Templates docker-compose.yml, .env, and Caddyfile
# - Pulls Docker images
# - Starts the stack with docker compose
# - Waits for the health check endpoint to respond

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Create data directories
  ansible.builtin.file:
    path: "{{ app_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"
  loop:
    - backups
    - backups/daily
    - backups/weekly
    - backups/monthly
    - scripts
    - postgres-init

- name: Deploy PostgreSQL init scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ app_dir }}/postgres-init/{{ item | basename }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  with_fileglob:
    - "{{ playbook_dir }}/../docker/postgres-init/*.sql"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart llamenos stack

- name: Template .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  notify: Restart llamenos stack

- name: Template Caddyfile
  ansible.builtin.template:
    src: caddy.j2
    dest: "{{ app_dir }}/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"
  notify: Restart llamenos stack

- name: Pull Docker images
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    pull: "{{ 'always' if pull_images | default(true) else 'missing' }}"
    state: present
    recreate: never
  register: compose_pull

- name: Start Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
  register: compose_up

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T postgres pg_isready -U llamenos -d llamenos
  register: pg_ready
  retries: 15
  delay: 2
  until: pg_ready.rc == 0
  changed_when: false

- name: Initialize MinIO — configure mc alias
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T minio mc alias set local http://localhost:9000 {{ minio_access_key }} {{ minio_secret_key }}
  changed_when: false
  no_log: true

- name: Initialize MinIO — create bucket
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T minio mc mb --ignore-existing local/{{ minio_bucket }}
  register: minio_bucket_result
  changed_when: "'created' in minio_bucket_result.stdout"

- name: Initialize MinIO — set recording lifecycle (90 days)
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T minio mc ilm rule add --expire-days 90 local/{{ minio_bucket }} --prefix recordings/
  register: minio_lifecycle_rec
  changed_when: minio_lifecycle_rec.rc == 0
  failed_when: false

- name: Initialize MinIO — set voicemail lifecycle (365 days)
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T minio mc ilm rule add --expire-days 365 local/{{ minio_bucket }} --prefix voicemails/
  register: minio_lifecycle_vm
  changed_when: minio_lifecycle_vm.rc == 0
  failed_when: false

- name: Initialize MinIO — create app IAM user
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T minio mc admin user add local {{ minio_app_user | default('llamenos-app') }} {{ minio_app_password }}
  register: minio_user_result
  changed_when: "'Successfully' in minio_user_result.stdout"
  failed_when: false

- name: Initialize MinIO — create and attach IAM policy
  ansible.builtin.shell: |
    echo '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject"],"Resource":["arn:aws:s3:::{{ minio_bucket }}/*"]},{"Effect":"Allow","Action":["s3:ListBucket"],"Resource":["arn:aws:s3:::{{ minio_bucket }}"]}]}' | \
      docker compose -f {{ app_dir }}/docker-compose.yml exec -T minio sh -c 'cat > /tmp/llamenos-policy.json'
    docker compose -f {{ app_dir }}/docker-compose.yml exec -T minio mc admin policy create local llamenos-app /tmp/llamenos-policy.json 2>/dev/null || true
    docker compose -f {{ app_dir }}/docker-compose.yml exec -T minio mc admin policy attach local llamenos-app --user {{ minio_app_user | default('llamenos-app') }} 2>/dev/null || true
  changed_when: false

- name: Install systemd service unit
  ansible.builtin.template:
    src: llamenos.service.j2
    dest: /etc/systemd/system/llamenos.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and restart llamenos

- name: Enable and start llamenos systemd service
  ansible.builtin.systemd:
    name: llamenos
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for application health check
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T app curl -sf http://localhost:3000/api/health
  register: health_check
  retries: 20
  delay: 5
  until: health_check.rc == 0
  changed_when: false

- name: Install demo data reset cron job
  ansible.builtin.cron:
    name: "Llamenos demo data reset"
    minute: "{{ demo_reset_cron.split(' ')[0] }}"
    hour: "{{ demo_reset_cron.split(' ')[1] }}"
    day: "{{ demo_reset_cron.split(' ')[2] }}"
    month: "{{ demo_reset_cron.split(' ')[3] }}"
    weekday: "{{ demo_reset_cron.split(' ')[4] }}"
    user: "{{ deploy_user }}"
    job: >-
      curl -sf -X POST https://{{ domain }}/api/test-reset
      -H "X-Test-Secret: {{ dev_reset_secret }}"
      >> /var/log/llamenos-demo-reset.log 2>&1
    state: present
  when: demo_mode | default('') | string == 'true'

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Llamenos deployed successfully.

      Application URL: https://{{ domain }}
      Health check: {{ health_check.stdout | default('OK') }}

      To view logs:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose logs -f'

      To check status:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose ps'
