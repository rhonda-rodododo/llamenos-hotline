---
# Llamenos application deployment role
#
# - Creates app directory structure
# - Templates docker-compose.yml, .env, and Caddyfile
# - Pulls Docker images
# - Starts the stack with docker compose
# - Waits for the health check endpoint to respond

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Create data directories
  ansible.builtin.file:
    path: "{{ app_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"
  loop:
    - backups
    - backups/daily
    - backups/weekly
    - backups/monthly
    - scripts

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart llamenos stack

- name: Template .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  notify: Restart llamenos stack

- name: Template Caddyfile
  ansible.builtin.template:
    src: caddy.j2
    dest: "{{ app_dir }}/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart llamenos stack

- name: Pull Docker images
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    pull: always
    state: present
    recreate: never
  register: compose_pull

- name: Start Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
  register: compose_up

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T postgres pg_isready -U llamenos -d llamenos
  register: pg_ready
  retries: 15
  delay: 2
  until: pg_ready.rc == 0
  changed_when: false

- name: Copy init-minio.sh to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../deploy/scripts/init-minio.sh"
    dest: "{{ app_dir }}/scripts/init-minio.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Initialize MinIO bucket and IAM user
  ansible.builtin.command: "{{ app_dir }}/scripts/init-minio.sh"
  become_user: "{{ deploy_user }}"
  environment:
    MINIO_URL: "http://localhost:9000"
    MINIO_ROOT_USER: "{{ minio_access_key }}"
    MINIO_ROOT_PASSWORD: "{{ minio_secret_key }}"
    MINIO_BUCKET: "{{ minio_bucket }}"
    MINIO_APP_USER: "{{ minio_app_user | default('llamenos-app') }}"
    MINIO_APP_PASSWORD: "{{ minio_app_password }}"
  register: minio_init
  changed_when: "'initialized successfully' in minio_init.stdout"

- name: Install systemd service unit
  ansible.builtin.template:
    src: llamenos.service.j2
    dest: /etc/systemd/system/llamenos.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and restart llamenos

- name: Enable and start llamenos systemd service
  ansible.builtin.systemd:
    name: llamenos
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for application health check
  ansible.builtin.uri:
    url: "http://localhost:3000/api/health"
    method: GET
    status_code: 200
    return_content: true
  register: health_check
  retries: 20
  delay: 5
  until: health_check.status == 200

- name: Install demo data reset cron job
  ansible.builtin.cron:
    name: "Llamenos demo data reset"
    minute: "{{ demo_reset_cron.split(' ')[0] }}"
    hour: "{{ demo_reset_cron.split(' ')[1] }}"
    day: "{{ demo_reset_cron.split(' ')[2] }}"
    month: "{{ demo_reset_cron.split(' ')[3] }}"
    weekday: "{{ demo_reset_cron.split(' ')[4] }}"
    user: "{{ deploy_user }}"
    job: >-
      curl -sf -X POST https://{{ domain }}/api/test-reset
      -H "X-Test-Secret: {{ dev_reset_secret }}"
      >> /var/log/llamenos-demo-reset.log 2>&1
    state: present
  when: demo_mode | default('') | string == 'true'

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Llamenos deployed successfully.

      Application URL: https://{{ domain }}
      Health check: {{ health_check.json | default('OK') }}

      To view logs:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose logs -f'

      To check status:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose ps'
