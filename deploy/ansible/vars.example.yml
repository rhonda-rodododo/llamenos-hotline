# Llamenos Deployment Configuration
#
# Copy this file to vars.yml and fill in your values.
# Encrypt secrets with: ansible-vault encrypt vars.yml
#
# Quick Start:
#   1. cp vars.example.yml vars.yml
#   2. cp inventory.example.yml inventory.yml
#   3. bun run bootstrap-admin          # generates admin keypair
#   4. openssl rand -hex 32             # generates hmac_secret and server_nostr_secret
#   5. openssl rand -base64 24          # generates pg_password, minio keys, etc.
#   6. $EDITOR vars.yml                 # fill in all REQUIRED values
#   7. ansible-vault encrypt vars.yml
#   8. just setup-all
#
# To edit encrypted vars:
#   ansible-vault edit vars.yml
#
# Placeholder lengths in this file are intentionally sized to pass preflight
# validation in CI (--extra-vars "@vars.example.yml"). Replace all placeholders
# with real secrets before encrypting vars.yml for production use.

# ─── Domain & TLS ────────────────────────────────────────────────
# REQUIRED: Your domain name (Caddy will auto-provision TLS via Let's Encrypt)
domain: hotline.example.org

# REQUIRED: Email for Let's Encrypt certificate notifications
acme_email: admin@example.org

# ─── SSH Hardening ───────────────────────────────────────────────
# OPTIONAL: Port to move SSH to (default 22 is heavily targeted by bots)
ssh_port: 2222

# OPTIONAL: CIDR ranges allowed to connect via SSH
# Restrict to your admin IP addresses for maximum security
ssh_allowed_cidrs:
  - "0.0.0.0/0"       # WARNING: Replace with your actual IP/32

# ─── Deploy User ─────────────────────────────────────────────────
# REQUIRED: The non-root user that runs the application
deploy_user: deploy
deploy_group: deploy

# ─── Application ─────────────────────────────────────────────────
# REQUIRED: Docker image for the Llamenos app
# Use a specific tag in production (e.g., ghcr.io/llamenos/llamenos:0.20.0)
llamenos_image: ghcr.io/llamenos/llamenos:latest

# OPTIONAL: Docker image for Caddy reverse proxy
caddy_image: caddy:2.9-alpine

# OPTIONAL: Docker image for PostgreSQL
postgres_image: postgres:17-alpine

# OPTIONAL: Docker image for MinIO
minio_image: minio/minio:RELEASE.2025-01-20T14-49-07Z

# OPTIONAL: Directory on the host where app files are stored
app_dir: /opt/llamenos

# OPTIONAL: Name displayed in the UI (use a generic name for security)
hotline_name: Hotline

# OPTIONAL: Application environment
app_environment: production

# REQUIRED: Admin public key (generate with: bun run bootstrap-admin)
# This is the Nostr pubkey of the admin account (64 lowercase hex chars)
admin_pubkey: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

# REQUIRED: Admin decryption public key (generate with: bun run bootstrap-admin)
# Used for E2EE note envelope encryption (64 lowercase hex chars)
admin_decryption_pubkey: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"

# REQUIRED: HMAC secret for hashing phone numbers and IPs (at least 32 chars)
# Generate with: openssl rand -hex 32
hmac_secret: "cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc"

# ─── PostgreSQL ──────────────────────────────────────────────────
# REQUIRED: Database password (at least 16 chars)
# Generate with: openssl rand -base64 24
pg_password: "dddddddddddddddddddddddd"

# OPTIONAL: Connection pool size
pg_pool_size: 10

# ─── MinIO (Blob Storage) ───────────────────────────────────────
# REQUIRED: Access credentials
# Generate with: openssl rand -base64 24
minio_access_key: "eeeeeeeeeeeeeeeeeeeeeeee"
minio_secret_key: "ffffffffffffffffffffffff"
minio_bucket: llamenos-files

# ─── Telephony (Twilio) ─────────────────────────────────────────
# OPTIONAL: Leave empty if configuring via the admin UI or using Asterisk
twilio_account_sid: ""
twilio_auth_token: ""
twilio_phone_number: ""

# ─── Nostr Relay (Core) ─────────────────────────────────────────
# REQUIRED: Server secret for signing relay events (exactly 64 lowercase hex chars).
# Generate with: openssl rand -hex 32
server_nostr_secret: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# OPTIONAL: Relay URL (default: ws://strfry:7777 for the bundled strfry)
# nostr_relay_url: "ws://strfry:7777"

# ─── Optional Profiles ──────────────────────────────────────────
# OPTIONAL: Enable optional Docker Compose profiles
# Options: transcription, asterisk, signal
compose_profiles: []

# OPTIONAL: Whisper transcription settings (only used if 'transcription' profile enabled)
whisper_image: fedirz/faster-whisper-server:0.4.1
whisper_model: Systran/faster-whisper-base
whisper_device: cpu

# OPTIONAL: Asterisk PBX settings (only used if 'asterisk' profile enabled)
asterisk_image: andrius/asterisk:20
ari_username: llamenos
ari_password: ""
bridge_secret: ""
# Hotline phone number to receive calls on (E.164, e.g. +12125551234)
hotline_number: ""
# SIP trunk credentials for auto-configuration at bridge startup.
# When all three are set, the bridge writes PJSIP objects via ARI on startup
# so no manual pjsip.conf editing is needed.
sip_provider: ""   # e.g. sip.telnyx.com or sip.twilio.com
sip_username: ""   # SIP username / account SID
sip_password: ""   # SIP password / auth token

# OPTIONAL: Signal bridge settings (only used if 'signal' profile enabled)
signal_image: bbernhard/signal-cli-rest-api:0.92

# ─── Backup ─────────────────────────────────────────────────────
# OPTIONAL: Enable automated backups
backup_enabled: true

# OPTIONAL: age public key for encrypting backups
# Generate a keypair with: age-keygen -o backup-key.txt
# Store the private key somewhere safe (NOT on the server)
backup_age_public_key: ""

# OPTIONAL: Backup retention policy
backup_retain_daily: 7
backup_retain_weekly: 4
backup_retain_monthly: 3

# OPTIONAL: Backup schedule (cron format) — default: 3:00 AM UTC daily
backup_cron_hour: "3"
backup_cron_minute: "0"

# OPTIONAL: rclone remote for off-site backup storage
# Configure rclone on the server first: rclone config
# Examples: "s3:llamenos-backups", "b2:llamenos-backups"
backup_rclone_remote: ""

# ─── Docker Hardening ───────────────────────────────────────────
# OPTIONAL: Enable user namespace remapping for Docker container isolation
docker_userns_remap: true

# ─── Firewall ───────────────────────────────────────────────────
# OPTIONAL: Additional ports to open beyond SSH, HTTP, and HTTPS
# Example: [{ port: 5060, proto: "udp", comment: "SIP" }]
firewall_extra_ports: []

# ─── NTP ─────────────────────────────────────────────────────────
# OPTIONAL: NTP servers (accurate time is critical for Schnorr token validation)
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# ─── System ─────────────────────────────────────────────────────
# OPTIONAL: Timezone for the server
timezone: UTC

# OPTIONAL: Locale
locale: en_US.UTF-8
