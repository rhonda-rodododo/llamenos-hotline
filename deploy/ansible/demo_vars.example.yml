# Llamenos Demo Instance Configuration
#
# Copy this file to demo_vars.yml and fill in your values.
# Encrypt secrets with: ansible-vault encrypt demo_vars.yml
#
# Usage:
#   cp demo_vars.example.yml demo_vars.yml
#   $EDITOR demo_vars.yml
#   ansible-vault encrypt demo_vars.yml
#   just deploy-demo --ask-vault-pass
#
# To edit encrypted demo vars:
#   ansible-vault edit demo_vars.yml

# ─── Domain & TLS ────────────────────────────────────────────────
# Your demo domain name (Caddy will auto-provision TLS via Let's Encrypt)
domain: demo.llamenos-hotline.com

# Email for Let's Encrypt certificate notifications
acme_email: admin@yourdomain.org

# ─── SSH Hardening ───────────────────────────────────────────────
# Port to move SSH to (default 22 is heavily targeted by bots)
ssh_port: 2222

# CIDR ranges allowed to connect via SSH
# Restrict to your admin IP addresses for maximum security
ssh_allowed_cidrs:
  - "0.0.0.0/0"       # WARNING: Replace with your actual IP/32

# ─── Deploy User ─────────────────────────────────────────────────
# The non-root user that runs the application
deploy_user: deploy
deploy_group: deploy

# ─── Application ─────────────────────────────────────────────────
# Docker image for the Llamenos app
# Use a specific tag in production (e.g., ghcr.io/llamenos/llamenos:0.20.0)
llamenos_image: ghcr.io/llamenos/llamenos:latest

# Docker image for Caddy reverse proxy
caddy_image: caddy:2.9-alpine

# Docker image for PostgreSQL
postgres_image: postgres:17-alpine

# Docker image for RustFS
rustfs_image: rustfs/rustfs:latest

# Directory on the host where app files are stored
app_dir: /opt/llamenos

# Name displayed in the UI (use a generic name for security)
hotline_name: Hotline

# Application environment — MUST be 'demo' for demo instance
app_environment: demo

# Demo mode flag — enables periodic auto-reset and demo UI banners
demo_mode: "true"

# Secret for authenticating demo reset requests (X-Test-Secret header)
# Generate with: openssl rand -hex 32
dev_reset_secret: ""

# Cron schedule for auto-resetting demo data (cron format, UTC)
# Default: every 4 hours
demo_reset_cron: "0 */4 * * *"

# Admin public key (generate with: bun run bootstrap-admin)
# This is the Nostr pubkey of the admin account
admin_pubkey: ""

# Admin decryption pubkey for E2EE envelope (same as admin_pubkey for most setups)
admin_decryption_pubkey: ""

# HMAC secret for hashing phone numbers and IPs
# Generate with: openssl rand -hex 32
hmac_secret: ""

# ─── PostgreSQL ──────────────────────────────────────────────────
# Database password (generate with: openssl rand -base64 24)
pg_password: ""

# Connection pool size (app-side pool per process)
pg_pool_size: 20

# ─── Storage (RustFS) ──────────────────────────────────────────
# Access credentials (generate with: openssl rand -base64 24)
storage_access_key: ""
storage_secret_key: ""

# ─── Nostr Relay (Core) ─────────────────────────────────────────
# Server secret for signing relay events (must be exactly 64 hex chars)
# Generate with: openssl rand -hex 32 | xxd -p -c 64 (or openssl rand -hex 32)
server_nostr_secret: ""

# Relay URL (default: ws://strfry:7777 for the bundled strfry)
# nostr_relay_url: "ws://strfry:7777"

# ─── Telephony (Twilio) — optional for demo ─────────────────────
# Leave empty to skip telephony on the demo instance
twilio_account_sid: ""
twilio_auth_token: ""
twilio_phone_number: ""

# ─── Optional Profiles ──────────────────────────────────────────
# Enable optional Docker Compose profiles
# Options: transcription, asterisk, kamailio, signal
compose_profiles: []

# Whisper transcription settings (only used if 'transcription' profile enabled)
whisper_image: fedirz/faster-whisper-server:0.4.1
whisper_model: Systran/faster-whisper-base
whisper_device: cpu

# ─── Asterisk WebRTC (when asterisk profile enabled) ──────────
# Domain for SIP URI and WSS connections (defaults to main domain)
# asterisk_domain: demo.llamenos-hotline.com

# coturn TURN server shared secret (generate with: openssl rand -hex 32)
# Used for TURN credential generation. Required for WebRTC NAT traversal.
turn_secret: ""

# STUN/TURN server addresses (default: self-hosted coturn on same domain)
# stun_server: "stun:demo.llamenos-hotline.com:3478"
# turn_server: "turn:demo.llamenos-hotline.com:3478"

# coturn Docker image
coturn_image: coturn/coturn:4.6

# ─── Kamailio SIP Proxy (when kamailio profile enabled) ──────
# Kamailio is OPTIONAL — only needed for multi-PBX load balancing.
# Asterisk remains the default/flagship PBX for all deployments.
# kamailio_enabled: false
# kamailio_image: kamailio/kamailio:5.7
# kamailio_sip_domain: demo.llamenos-hotline.com
# kamailio_log_level: 4
# kamailio_dispatcher:
#   set_id: 1
#   algorithm: 4          # 0=hash-callid, 4=round-robin, 10=weight, 12=random
#   ping_interval: 10
#   ping_threshold: 3
# kamailio_pbx_instances:
#   - uri: "sip:asterisk:5060"
#     flags: 0
#     priority: 0
#     attrs: "weight=50"

# ─── IdP Auth (Authentik) ───────────────────────────────────────
# Secret key for Authentik (generate with: openssl rand -hex 32, must be >= 50 chars)
authentik_secret_key: ""

# Bootstrap token — auto-created on first Authentik startup, used by the app as API token.
# Generate with: openssl rand -hex 32
authentik_bootstrap_token: ""

# 32-byte key for encrypting IdP attribute values (base64-encoded)
# Generate with: openssl rand -base64 32
idp_value_encryption_key: ""

# Key version for rotation support (increment when rotating encryption key)
idp_value_key_version: 1

# JWT signing secret (generate with: openssl rand -hex 32)
jwt_secret: ""

# WebAuthn Relying Party settings (default to domain values)
# auth_webauthn_rp_id: demo.llamenos-hotline.com
# auth_webauthn_rp_name: Llamenos
# auth_webauthn_origin: https://demo.llamenos-hotline.com

# ─── Backup ─────────────────────────────────────────────────────
# Disable backups on demo instance (data is ephemeral by design)
backup_enabled: false

# ─── Watchtower (Auto-Updates) ──────────────────────────────────
# Enable Watchtower to automatically pull new app images.
# Set to true on instances where unattended rolling updates are acceptable.
# Leave false on instances requiring explicit deploy approvals.
watchtower_enabled: false

# Watchtower image (pin to a specific release for reproducibility)
watchtower_image: containrrr/watchtower:1.7.1

# Check interval in seconds (86400 = 24h, 3600 = 1h).
# Rendered directly into the generated docker-compose by Ansible — set this var, not an env var.
watchtower_poll_interval: 86400

# ─── Docker Hardening ───────────────────────────────────────────
# Enable user namespace remapping for Docker container isolation
docker_userns_remap: true

# ─── Firewall ───────────────────────────────────────────────────
# Additional ports to open beyond SSH, HTTP, and HTTPS
firewall_extra_ports: []

# ─── NTP ─────────────────────────────────────────────────────────
# NTP servers (accurate time is critical for Schnorr token validation)
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# ─── System ─────────────────────────────────────────────────────
# Timezone for the server
timezone: UTC

# Locale
locale: en_US.UTF-8
