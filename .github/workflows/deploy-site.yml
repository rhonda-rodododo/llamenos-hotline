# Deploy Marketing Site to Cloudflare Pages
#
# Triggers:
#   - New GitHub release published
#   - Push to main that changes site/ files
#   - Manual dispatch

name: Deploy Site

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths: ['site/**']
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-pages

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: site
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name llamenos-site
