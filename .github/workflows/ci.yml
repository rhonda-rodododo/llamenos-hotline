# Continuous Integration & Deployment
#
# On every push to main:
#   1. Detect changed files — skip version/release for docs-only changes
#   2. Build & validate (lint, typecheck, vite build, site build)
#   3. Run unit tests (with Postgres for DB-dependent tests)
#   4. Auto-determine version bump from conventional commits
#   5. Bump version, generate changelog, commit + tag
#   6. Create GitHub Release with changelog
#   (Desktop app releases are handled by tauri-release.yml)
#
# On pull requests (any target branch):
#   Runs build, test, and validation jobs only (no version bump or release).
#
# Docs-only changes (*.md and site/ files) skip tests and versioning.
#
# E2E tests, mobile, desktop, and crypto jobs are disabled until ready.
# To re-enable, add them back as jobs and update ci-status + version needs.
#
# The created tag also triggers docker.yml for Docker image builds.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress PR runs when new commits are pushed; never cancel main
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUN_VERSION: "1.3.5"
  # Test admin keypair (derived from ADMIN_NSEC in tests/helpers.ts)
  TEST_ADMIN_PUBKEY: "ac4718373d30301e5c7cf55e9e6f2568efb94f3278fb88f37f4981e880505228"

jobs:
  # ─── Detect Changed Files ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    outputs:
      app: ${{ steps.filter.outputs.app }}
      site: ${{ steps.filter.outputs.site }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ansible: ${{ steps.filter.outputs.ansible }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          # Get changed files between HEAD^ and HEAD
          CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff --name-only HEAD)

          echo "Changed files:"
          echo "$CHANGED"

          # Patterns for files that DON'T need tests (inverted logic)
          # Only markdown files and site/ files can skip tests. Everything else triggers them.
          SKIP_TESTS_PATTERN="\.md$|^site/"

          # Check if ALL changed files match the skip pattern
          DOCS_ONLY="true"
          SITE_CHANGED="false"
          ANSIBLE_CHANGED="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == site/* ]]; then
              SITE_CHANGED="true"
            fi
            if [[ "$file" == deploy/ansible/* ]]; then
              ANSIBLE_CHANGED="true"
            fi
            if ! echo "$file" | grep -qE "$SKIP_TESTS_PATTERN"; then
              DOCS_ONLY="false"
              echo "Non-docs file changed: $file"
            fi
          done <<< "$CHANGED"

          {
            echo "app=$([ "$DOCS_ONLY" = "false" ] && echo true || echo false)"
            echo "site=$SITE_CHANGED"
            echo "docs_only=$DOCS_ONLY"
            echo "ansible=$ANSIBLE_CHANGED"
          } >> "$GITHUB_OUTPUT"

          if [[ "$DOCS_ONLY" == "true" ]]; then
            echo "Only docs/site files changed — tests will be skipped"
          else
            echo "App/infra files changed — tests required"
          fi

  # ─── Lint ──────────────────────────────────────────────────
  lint:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  # ─── Build & Validate ──────────────────────────────────────
  build:
    needs: [changes, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install site dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Set build-time constants (Epic 79)
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Compute build checksums (Epic 79)
        run: |
          cd dist
          find client -type f -exec sha256sum {} \; | sort > ../CHECKSUMS.txt
          cd ..
          sha256sum bun.lockb >> CHECKSUMS.txt
          echo "$(wc -l < CHECKSUMS.txt) files checksummed"

      - name: Build marketing site
        run: bun run site:build

      # Upload build artifacts for deploy jobs
      - name: Upload app build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-build
          path: dist/
          retention-days: 1

      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksums
          path: CHECKSUMS.txt
          retention-days: 7

      - name: Upload site build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-build
          path: site/dist/
          retention-days: 1

  # ─── Unit Tests ────────────────────────────────────────────
  unit-tests:
    needs: [changes, build]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: llamenos
          POSTGRES_USER: llamenos
          POSTGRES_PASSWORD: llamenos
        options: >-
          --health-cmd "pg_isready -U llamenos -d llamenos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://llamenos:llamenos@localhost:5432/llamenos
          TEST_DATABASE_URL: postgresql://llamenos:llamenos@localhost:5432/llamenos
          ADMIN_PUBKEY: ${{ env.TEST_ADMIN_PUBKEY }}
        run: bun run test:unit

  # ─── Dependency Vulnerability Scan ───────────────────────────
  audit:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          # bun audit requires >= 1.3
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        # Tiered approach: warn on high-severity, fail on critical.
        run: |
          bun audit --audit-level=high || {
            echo "::warning::High-severity vulns found — checking for critical"
            bun audit --audit-level=critical
          }

  # ─── Ansible Validation ───────────────────────────────────
  ansible-validate:
    needs: changes
    if: needs.changes.outputs.ansible == 'true' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Ansible and ansible-lint
        run: pip install ansible ansible-lint

      - name: Install required collections
        run: ansible-galaxy collection install community.docker

      - name: Run ansible-lint
        run: cd deploy/ansible && ansible-lint .

      - name: Dry-run check
        run: |
          cd deploy/ansible
          # Playbook includes vars.yml internally; provide example as the real file
          cp vars.example.yml vars.yml
          ansible-playbook setup.yml --check --diff \
            -i inventory.example.yml \
            --extra-vars "@vars.example.yml"

  # ─── Version Bump & Changelog ──────────────────────────────
  version:
    needs: [changes, build, audit, unit-tests]
    # Skip version bump for docs-only changes and PRs; require test success for app changes
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.changes.outputs.docs_only != 'true' &&
      needs.build.result == 'success' &&
      needs.audit.result == 'success' &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      old_version: ${{ steps.version.outputs.old_version }}
      bump_type: ${{ steps.version.outputs.bump_type }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump from commits
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          # No commits since last tag means this IS the tag commit — skip
          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since last tag. Skipping release."
            exit 0
          fi

          echo "Commits since ${LATEST_TAG:-beginning}:"
          echo "$COMMITS"

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Read current version
          OLD_VERSION=$(node -p "require('./package.json').version")

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          {
            echo "bump_type=$BUMP"
            echo "old_version=$OLD_VERSION"
            echo "new_version=$NEW_VERSION"
            echo "should_release=true"
          } >> "$GITHUB_OUTPUT"
          echo "Version: $OLD_VERSION → $NEW_VERSION ($BUMP)"

      - name: Install git-cliff
        if: steps.version.outputs.should_release == 'true'
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz -o /tmp/git-cliff.tar.gz
          echo "d9705c9f43bd74e2d10ca7df10b624bbe6f15bd4774f6c1e012db5be276f91f7  /tmp/git-cliff.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin --strip-components=1 -f /tmp/git-cliff.tar.gz git-cliff-2.7.0/git-cliff
          rm /tmp/git-cliff.tar.gz

      - name: Bump version in package.json
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog and commit release
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage version files
          git add package.json

          # Create tag so git-cliff can generate notes for this version
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

          # Generate full CHANGELOG.md (includes the new tag)
          git-cliff --output CHANGELOG.md

          # Amend the release commit to include the changelog
          git add CHANGELOG.md
          git commit --amend --no-edit

          # Move the tag to the amended commit
          git tag -f -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      - name: Push release
        if: steps.version.outputs.should_release == 'true'
        run: |
          # Rebase onto any commits pushed during tests
          git pull --rebase origin main
          git push origin main --follow-tags

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    needs: [version]
    if: github.event_name == 'push' && needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # Required for SLSA attestation
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: checksums

      - name: Download app build (for attestation)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-build
          path: dist/

      - name: Generate SLSA build provenance attestation (Epic 79)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2.1.0
        with:
          subject-path: |
            CHECKSUMS.txt
            dist/client/**/*.js
            dist/client/**/*.css

      - name: Generate provenance metadata JSON (Epic 79)
        run: |
          cat > provenance.json <<PROVEOF
          {
            "builder": { "id": "https://github.com/actions/runner" },
            "buildType": "https://github.com/slsa-framework/slsa/blob/main/docs/spec/v1.0/levels.md",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@refs/tags/v${{ needs.version.outputs.new_version }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": ".github/workflows/ci.yml"
              },
              "parameters": {
                "SOURCE_DATE_EPOCH": "$(git log -1 --format=%ct)",
                "bunVersion": "${{ env.BUN_VERSION }}"
              }
            },
            "buildConfig": {
              "dockerfile": "Dockerfile.build",
              "steps": ["bun install --frozen-lockfile", "bun run build"]
            },
            "metadata": {
              "buildStartedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "buildFinishedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": true
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}@refs/tags/v${{ needs.version.outputs.new_version }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            ]
          }
          PROVEOF
          # Clean up leading whitespace from heredoc indentation
          python3 -c "
          import json, sys
          with open('provenance.json') as f:
              data = json.load(f)
          with open('provenance.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "--- provenance.json ---"
          cat provenance.json

      - name: GPG sign CHECKSUMS.txt (Epic 79)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_KEY_ID" ]; then
            echo "GPG signing secrets not configured — skipping signature"
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --armor --local-user "$GPG_KEY_ID" --detach-sign CHECKSUMS.txt
          echo "GPG signature generated: CHECKSUMS.txt.asc"
          gpg --verify CHECKSUMS.txt.asc CHECKSUMS.txt
          echo "GPG signature verified successfully"

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz -o /tmp/git-cliff.tar.gz
          echo "d9705c9f43bd74e2d10ca7df10b624bbe6f15bd4774f6c1e012db5be276f91f7  /tmp/git-cliff.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin --strip-components=1 -f /tmp/git-cliff.tar.gz git-cliff-2.7.0/git-cliff
          rm /tmp/git-cliff.tar.gz

      - name: Generate release notes
        run: |
          git-cliff --latest --strip header > RELEASE_NOTES.md
          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            CHECKSUMS.txt
            CHECKSUMS.txt.asc
            provenance.json

  # ─── CI Status Gate ─────────────────────────────────────────
  # Single status check for branch protection rules.
  # All required jobs must pass for PRs to be mergeable.
  ci-status:
    needs: [build, audit, unit-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "build failed"
            exit 1
          fi
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "audit failed"
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" && "${{ needs.unit-tests.result }}" != "skipped" ]]; then
            echo "unit-tests failed"
            exit 1
          fi
          echo "All required checks passed!"
