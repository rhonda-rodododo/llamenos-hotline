name: Install git-cliff
description: Download and verify git-cliff for changelog generation

inputs:
  version:
    description: git-cliff version
    default: "2.7.0"
  sha256:
    description: Expected SHA-256 hash of the tarball
    default: "d9705c9f43bd74e2d10ca7df10b624bbe6f15bd4774f6c1e012db5be276f91f7"

runs:
  using: composite
  steps:
    - name: Install git-cliff
      shell: bash
      run: |
        curl -sSfL "https://github.com/orhun/git-cliff/releases/download/v${{ inputs.version }}/git-cliff-${{ inputs.version }}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/git-cliff.tar.gz
        echo "${{ inputs.sha256 }}  /tmp/git-cliff.tar.gz" | sha256sum -c -
        tar xz -C /usr/local/bin --strip-components=1 -f /tmp/git-cliff.tar.gz "git-cliff-${{ inputs.version }}/git-cliff"
        rm /tmp/git-cliff.tar.gz
