pre-commit:
  parallel: true
  jobs:
    - name: lint-fix
      glob: "*.{ts,tsx,js,jsx}"
      run: |
        bunx biome check --write --files-ignore-unknown=true {staged_files} >/dev/null 2>&1
        bunx biome check --diagnostic-level=error --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    - name: pii-check
      run: "test -x scripts/pii-check.sh && scripts/pii-check.sh || true"
